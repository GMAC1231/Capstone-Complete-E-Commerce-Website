<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopEase | Shop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">ShopEase</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="shop.html">Shop</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="cart.html">
            Cart <span class="badge text-bg-warning cart-count">0</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="btn btn-warning fw-semibold ms-lg-2" href="checkout.html">Checkout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-5">

  <section class="shop-banner rounded-4 p-4 p-md-5 mb-4">
    <h1 class="fw-bold text-white">Shop Products</h1>
    <p class="text-white-50 mb-0">
      Browse all products, search by name, filter by category, and sort by price or rating.
    </p>
  </section>

  <section class="filter-panel rounded-4 shadow-sm p-4 mb-4">
    <div class="row g-3">

      <div class="col-md-4">
        <label for="searchInput" class="form-label fw-semibold">Search Products</label>
        <input 
          type="search" 
          id="searchInput" 
          class="form-control" 
          placeholder="Search headphones, shoes, chair..."
        >
      </div>

      <div class="col-md-3">
        <label for="categoryFilter" class="form-label fw-semibold">Filter by Category</label>
        <select id="categoryFilter" class="form-select"></select>
      </div>

      <div class="col-md-3">
        <label for="sortSelect" class="form-label fw-semibold">Sort Products</label>
        <select id="sortSelect" class="form-select">
          <option value="default">Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating-desc">Highest Rating</option>
          <option value="name-asc">Name A-Z</option>
        </select>
      </div>

      <div class="col-md-2 d-flex align-items-end">
        <button id="clearFilters" class="btn btn-outline-secondary w-100">
          Clear
        </button>
      </div>

    </div>
  </section>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="h4 fw-bold mb-0">All Products</h2>
    <span class="text-muted" id="productResultCount"></span>
  </div>

  <section class="row g-4" id="productsGrid"></section>

</main>

<footer class="bg-dark text-white-50 py-4 mt-5">
  <div class="container d-flex flex-column flex-md-row justify-content-between gap-2">
    <p class="mb-0">© 2026 ShopEase. Capstone Project.</p>
    <p class="mb-0">Products page with search, filter, and sorting.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
