<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Abdullah Shopping</title>
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
    </head>
    <body>

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Abdullah Shopping</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="shop.html">Shop</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="cart.html">
            Cart <span class="badge text-bg-warning cart-count">0</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="btn btn-warning fw-semibold ms-lg-2" href="checkout.html">Checkout</a>
        </li>

        <li class="nav-item">
          <a class="btn btn-outline-light fw-semibold ms-lg-2" href="portfolio.html">Portfolio</a>
        </li>
      </ul>
    </div>
  </div>
</nav>



<main class="container my-5">
    <h1 class="fw-bold mb-4">Shopping Cart</h1>
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="cart-box rounded-4 shadow-sm p-3 p-md-4" id="cartPageItems"></div>
        </div>

            <div class="col-lg-4">
      <div class="cart-summary rounded-4 shadow-sm p-4 sticky-lg-top summary-sticky">
        <h2 class="h4 fw-bold">Order Summary</h2>

        <div class="d-flex justify-content-between mt-3">
          <span>Subtotal</span>
          <strong>$<span id="summarySubtotal">0.00</span></strong>
        </div>

        <div class="d-flex justify-content-between mt-2">
          <span>Shipping</span>
          <strong>$<span id="summaryShipping">0.00</span></strong>
        </div>

        <hr>

        <div class="d-flex justify-content-between fs-5">
          <span>Total</span>
          <strong>$<span id="summaryTotal">0.00</span></strong>
        </div>

        <a href="checkout.html" class="btn btn-warning w-100 fw-semibold mt-4" id="cartCheckoutBtn">
          Proceed to Checkout
        </a>

        <a href="shop.html" class="btn btn-outline-dark w-100 mt-2">
          Continue Shopping
        </a>
      </div>
    </div>
    </div>
</main>

<footer class="bg-dark text-white-50 py-4 mt-5">
    <div class="container d-flex flex-column flex-md-row jusity-content-between gap-2">
    <p class="mb-0">Abdullah Shopping. Capstone Project.</p>
    <p class="mb-0">Cart saved using localStorage.</p>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
